<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>

<title>建築師考試備考計畫</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F9F7F4;font-family:'Noto Serif TC',Georgia,serif}
#root{min-height:100vh}
#ls{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#F9F7F4;padding:24px}
.lc{background:#fff;border-radius:20px;padding:40px 32px;max-width:380px;width:100%;text-align:center;box-shadow:0 4px 40px rgba(0,0,0,.10)}
.ll{width:64px;height:64px;background:#C8956C;color:#fff;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:900;margin:0 auto 20px}
.lt{font-size:20px;font-weight:900;color:#2C2C2C;margin-bottom:6px}
.ls2{font-size:13px;color:#aaa;margin-bottom:32px}
.gb{display:flex;align-items:center;justify-content:center;gap:12px;background:#fff;border:1.5px solid #ddd;border-radius:12px;padding:14px 24px;font-size:15px;font-family:inherit;font-weight:600;cursor:pointer;color:#333;width:100%}
.gb svg{width:20px;height:20px;flex-shrink:0}
#ld{display:flex;align-items:center;justify-content:center;min-height:100vh;font-size:14px;color:#aaa;font-family:'Noto Serif TC',serif;flex-direction:column;gap:16px}
.sp{width:40px;height:40px;border:4px solid #eee;border-top-color:#C8956C;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="ld"><div class="sp"></div><div>載入中，請稍候...</div></div>
<div id="ls"><div class="lc">
<div class="ll">建</div>
<div class="lt">建築師考試備考計畫</div>
<div class="ls2">專門職業及技術人員高等考試</div>
<button class="gb" id="glb">
<svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
使用 Google 帳號登入</button>

</div></div>
<div id="root" style="display:none"></div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getAuth,GoogleAuthProvider,signInWithPopup,onAuthStateChanged,signOut}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import{getFirestore,doc,getDoc,setDoc}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
const fc={apiKey:'AIzaSyD9F-aZ9mTSOjpDqFPv3ZpgyQIO1Ekfr68',authDomain:'architect-planner-9e9f8.firebaseapp.com',projectId:'architect-planner-9e9f8',storageBucket:'architect-planner-9e9f8.firebasestorage.app',messagingSenderId:'541936154768',appId:'1:541936154768:web:95d6917767c7f07a290015'};
const app=initializeApp(fc);
const auth=getAuth(app);const db=getFirestore(app);const gp=new GoogleAuthProvider();

async function fbLoad(uid){try{const s=await getDoc(doc(db,'users',uid,'data','main'));if(!s.exists())return null;const m=s.data();try{const d=await getDoc(doc(db,'users',uid,'data','drawingLog'));return{...m,drawingLog:d.exists()?d.data():{}}}catch(e){return m}}catch(e){return null}}
async function fbSave(uid,data){try{const{drawingLog,...rest}=data;await setDoc(doc(db,'users',uid,'data','main'),rest);if(drawingLog)await setDoc(doc(db,'users',uid,'data','drawingLog'),drawingLog)}catch(e){console.error(e)}}

document.getElementById('glb').addEventListener('click',async()=>{
  try{
    document.getElementById('ld').style.display='flex';
    document.getElementById('ls').style.display='none';
    await signInWithPopup(auth,gp);
  }catch(e){
    console.error(e);
    document.getElementById('ld').style.display='none';
    document.getElementById('ls').style.display='flex';
    alert('登入失敗，請重試');
  }
});

onAuthStateChanged(auth,async(user)=>{
  if(user){
    window.__fbSave=(d)=>fbSave(user.uid,d);
    window.__fbLoad=()=>fbLoad(user.uid);
    window.__fbUser=user;
    window.__fbSignOut=()=>signOut(auth);
    // Show app only after React has mounted
    if(window.__reactMounted){
      document.getElementById('ld').style.display='none';
      document.getElementById('root').style.display='block';
    }else{
      window.__userReady=true;
    }
  }else{
    window.__fbSave=null;window.__fbLoad=null;window.__fbUser=null;
    document.getElementById('ld').style.display='none';
    document.getElementById('ls').style.display='flex';
    document.getElementById('root').style.display='none';
  }
});
</script>
